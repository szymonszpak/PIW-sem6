<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ToDo List</h1>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Szukaj zadania...">
            <label class="checkbox-label">
                <input type="checkbox" id="caseInsensitiveCheckbox"> Case-insensitive
            </label>
        </div>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Co jest do zrobienia?">
            <select id="listSelector" class="list-select">
                <option value="listUrgent">Pilne</option>
                <option value="listNormal">Mało pilne</option>
                <option value="listYesterday">Na wczoraj</option>
            </select>
            <button id="addBtn" class="button btnAdd">Dodaj</button>
        </div>

        <div class="lists-container">
            <div class="list-group">
                <h3 class="list-header">Pilne<span class="arrow">▼</span></h3>
                <ul id="listUrgent" class="task-list"></ul>
            </div>
            
            <div class="list-group">
                <h3 class="list-header">Mało pilne<span class="arrow">▼</span></h3>
                <ul id="listNormal" class="task-list"></ul>
            </div>

            <div class="list-group">
                <h3 class="list-header">Na wczoraj<span class="arrow">▼</span></h3>
                <ul id="listLater" class="task-list"></ul>
            </div>
        </div>
        
        <button id="undoBtn" class="button btnUndo">Cofnij ostatnie usunięcie</button>

    </div>

    <div id="deleteModal" class="modal-overlay hidden">
        <div class="modal-window">
            <p>Czy na pewno chcesz usunąć zadanie o treści: <strong id="taskToDeleteText"></strong>?</p>
            <div class="modal-buttons">
                <button id="confirmDeleteBtn" class="button btnConfirm">Tak, usuń</button>
                <button id="cancelDeleteBtn" class="button btnCancel">Nie, zostaw</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
